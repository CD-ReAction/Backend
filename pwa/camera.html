<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re:Action — 카메라</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc; flex-shrink: 0;
    }
    .header .dot.ready { background: #22c55e; }
    .header .dot.recording { background: #ef4444; animation: recBlink 1s infinite; }
    .header .dot.done { background: #3b82f6; }
    .header .dot.error { background: #ef4444; }
    @keyframes recBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .header .status-text { font-size: 14px; color: rgba(255,255,255,0.85); }
    #videoPreview {
      width: 100%; height: 100%;
      object-fit: cover; flex: 1;
    }
    .controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 20px 24px 48px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .record-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 4px solid white;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .record-btn:active { transform: scale(0.93); }
    .record-inner {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #ef4444;
      transition: border-radius 0.25s, width 0.25s, height 0.25s;
    }
    .record-btn.recording .record-inner {
      border-radius: 6px;
      width: 26px; height: 26px;
    }
    .record-btn.stopped .record-inner { background: #555; }
    .upload-btn {
      display: none;
      width: 100%; max-width: 320px;
      padding: 15px;
      background: white;
      border: none; border-radius: 14px;
      color: #111; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .upload-btn:disabled { opacity: 0.5; cursor: default; }
    .upload-btn.uploading { background: #3b82f6; color: white; }
    .upload-btn.success { background: #22c55e; color: white; }
    .msg { font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; }
    .progress {
      width: 100%; max-width: 320px; height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px; overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: #3b82f6; transition: width 0.2s;
    }
    .start-overlay {
      position: fixed; inset: 0;
      z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 24px;
    }
    .start-overlay.hidden { display: none; }
    .start-icon { font-size: 56px; }
    .start-text {
      font-size: 16px; line-height: 1.6;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }
    .start-btn {
      margin-top: 12px;
      padding: 16px 28px;
      background: white; color: #111;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="start-overlay" id="startOverlay">
    <div class="start-icon">📱↻</div>
    <div class="start-text">
      핸드폰을 가로로 돌린 뒤<br>
      아래 버튼을 눌러주세요
    </div>
    <button class="start-btn" onclick="beginCamera()">촬영 준비</button>
  </div>

  <div class="header">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">카메라 준비 중...</span>
  </div>

  <video id="videoPreview" autoplay muted playsinline></video>

  <div class="controls">
    <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="record-btn" id="recordBtn" onclick="toggleRecord()">
      <div class="record-inner"></div>
    </div>
    <div class="msg" id="msg"></div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const SESSION_ID = params.get("session");      // camera-session ID (인메모리)
  const DB_SESSION_ID = params.get("db_session"); // DB sessions 테이블 ID

  // 녹화 품질: 1080p / 4Mbps → 1시간 약 1.8GB, 표정 분석에 충분
  const TARGET_VIDEO_BPS = 4_000_000;
  const TARGET_AUDIO_BPS = 128_000;
  // 5초 단위 청크 → 5초마다 ondataavailable 발생 → 스트리밍 버퍼에 누적
  const CHUNK_TIMESLICE_MS = 5000;

  // 스트리밍 업로드 타임아웃 — hang 방지 핵심
  const STREAM_FETCH_TIMEOUT_MS = 10_000;    // init / part-urls / complete / abort
  const STREAM_PUT_TIMEOUT_MS = 60_000;      // S3 파트 PUT (16MB 기준)
  const STREAM_FINALIZE_TIMEOUT_MS = 90_000; // 정지 후 잔여 업로드 + complete 전체 데드라인

  // iOS Safari: requestFullscreen이 documentElement에서 동작 안 하고,
  // autoplay가 엄격해서 srcObject 세팅 직후 명시적 play()가 필요함.
  const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                 (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  let mediaRecorder = null;
  let stream = null;
  let recording = false;
  let currentMimeType = "";
  let recordingPipeline = null;
  // 녹화 중 백그라운드로 진행되는 multipart 업로드 상태. init() 단계에서 채워짐.
  // failed 세팅되면 즉시 에러 UX로 전환 (폴백 없음).
  let streamingState = null;

  // ──────────────────────────────────────────────────────────────────
  // 폰이 세로면 캔버스로 90° 회전시켜서 항상 가로 픽셀로 녹화
  // ──────────────────────────────────────────────────────────────────
  function shouldRotateForRecording(srcStream) {
    const orient = screen.orientation?.type || "";
    if (orient.startsWith("portrait")) return true;
    const track = srcStream.getVideoTracks()[0];
    const { width, height } = track.getSettings();
    if (width && height && height > width) return true;
    return false;
  }

  async function buildRecordingStream(srcStream) {
    if (!shouldRotateForRecording(srcStream)) {
      return { stream: srcStream, cleanup: () => {} };
    }

    const videoEl = document.createElement("video");
    videoEl.srcObject = srcStream;
    videoEl.muted = true;
    videoEl.playsInline = true;
    // iOS Safari: 내부 video가 재생돼야 canvas에 프레임이 들어옴. await로 확실히 시작.
    try { await videoEl.play(); } catch (e) { console.warn("canvas pipeline play 실패", e); }

    const canvas = document.createElement("canvas");
    canvas.width = 1920;
    canvas.height = 1080;
    const ctx = canvas.getContext("2d");

    let sw = 0, sh = 0;
    let stopped = false;

    function tick() {
      if (stopped) return;
      if (videoEl.readyState >= 2) {
        if (!sw && videoEl.videoWidth) {
          sw = videoEl.videoWidth;
          sh = videoEl.videoHeight;
          canvas.width = sh;
          canvas.height = sw;
        }
        if (sw && sh) {
          ctx.save();
          ctx.translate(canvas.width / 2, canvas.height / 2);
          ctx.rotate(-Math.PI / 2);
          ctx.drawImage(videoEl, -sw / 2, -sh / 2, sw, sh);
          ctx.restore();
        }
      }
      requestAnimationFrame(tick);
    }
    tick();

    const canvasStream = canvas.captureStream(30);
    srcStream.getAudioTracks().forEach(t => canvasStream.addTrack(t));

    return {
      stream: canvasStream,
      cleanup: () => {
        stopped = true;
        videoEl.srcObject = null;
      },
    };
  }

  // ──────────────────────────────────────────────────────────────────
  // MediaRecorder mimeType picker (VP9 → VP8 → MP4 H.264 → 기본)
  // ──────────────────────────────────────────────────────────────────
  function pickMimeType() {
    const candidates = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm",
      "video/mp4;codecs=h264,aac",
      "video/mp4",
    ];
    for (const t of candidates) {
      if (window.MediaRecorder?.isTypeSupported?.(t)) return t;
    }
    return "";
  }
  // 업로드 시 서버에 보낼 content-type (codecs 파라미터는 떼야 ALLOWED_MIME 통과)
  function baseMime(m) {
    if (!m) return "video/webm";
    const base = m.split(";")[0].trim();
    return base === "video/webm" || base === "video/mp4" || base === "video/quicktime"
      ? base : "video/webm";
  }

  // ──────────────────────────────────────────────────────────────────
  // 스트리밍 업로드 — 녹화 중 청크가 들어올 때마다 partSize 단위로 잘라 S3에 PUT.
  // 정지 시점엔 잔여 + complete만 호출되므로 체감 업로드 시간이 거의 0.
  // 폴백 없음: 어디서든 실패하면 streamingState.failed 세팅 후 사용자에게 에러.
  // ──────────────────────────────────────────────────────────────────
  async function fetchWithTimeout(url, options = {}, timeoutMs = STREAM_FETCH_TIMEOUT_MS) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeoutMs);
    try {
      return await fetch(url, { ...options, signal: ctrl.signal });
    } finally {
      clearTimeout(timer);
    }
  }

  async function streamingPut(url, blob, maxAttempts = 3) {
    let lastErr;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      try {
        const res = await fetchWithTimeout(url, { method: "PUT", body: blob }, STREAM_PUT_TIMEOUT_MS);
        if (!res.ok) throw new Error(`PUT ${res.status}`);
        const etag = res.headers.get("ETag");
        if (!etag) throw new Error("ETag 없음 (CORS ExposeHeaders 확인)");
        return etag.replaceAll('"', "");
      } catch (e) {
        lastErr = e;
        if (attempt < maxAttempts - 1) {
          await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt)));
        }
      }
    }
    throw lastErr;
  }

  // "촬영 준비" 단계에서 호출. multipart 세션을 미리 열어둠.
  async function initStreaming() {
    const tentativeMime = pickMimeType();
    const contentType = baseMime(tentativeMime || "video/webm");
    const apiBase = `${CONFIG.API_BASE_URL}/api/v1/sessions/${DB_SESSION_ID}/video`;

    const initRes = await fetchWithTimeout(`${apiBase}/upload/init`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content_type: contentType }), // file_size 미정 → 백엔드가 옵셔널 처리
    });
    if (!initRes.ok) throw new Error(`init ${initRes.status}`);
    const { upload_id, s3_key, part_size } = await initRes.json();

    streamingState = {
      apiBase,
      contentType,
      uploadId: upload_id,
      s3Key: s3_key,
      partSize: part_size,
      buffer: [],              // 미분할 청크들 (Blob[])
      bufferSize: 0,
      nextPartNumber: 1,
      pendingPartsQueue: [],   // [{partNumber, blob}, ...]
      etags: [],               // 완료된 파트들
      workerActive: false,
      failed: null,
    };
    // 첫 녹화는 이 mime로 진행 (변경되면 backend가 reject)
    currentMimeType = tentativeMime;
  }

  // ondataavailable에서 호출. 버퍼 누적 + partSize 차면 cut + 워커 트리거.
  function streamingFeedChunk(chunkBlob) {
    if (!streamingState || streamingState.failed) return;
    streamingState.buffer.push(chunkBlob);
    streamingState.bufferSize += chunkBlob.size;
    while (streamingState.bufferSize >= streamingState.partSize) {
      streamingCutPart(streamingState.partSize);
    }
    if (!streamingState.workerActive) streamingStartWorker();
  }

  function streamingCutPart(targetSize) {
    const combined = new Blob(streamingState.buffer, { type: streamingState.contentType });
    const actual = Math.min(targetSize, combined.size);
    const partBlob = combined.slice(0, actual);
    const remainder = combined.slice(actual);
    streamingState.buffer = remainder.size > 0 ? [remainder] : [];
    streamingState.bufferSize = remainder.size;
    const partNumber = streamingState.nextPartNumber++;
    streamingState.pendingPartsQueue.push({ partNumber, blob: partBlob });
  }

  // 단일 워커 — 큐 드레인까지 진행. 어디서든 실패하면 failed 세팅 후 종료.
  async function streamingStartWorker() {
    if (!streamingState || streamingState.workerActive) return;
    streamingState.workerActive = true;
    try {
      while (streamingState && !streamingState.failed && streamingState.pendingPartsQueue.length > 0) {
        const { partNumber, blob } = streamingState.pendingPartsQueue.shift();
        const urlsRes = await fetchWithTimeout(`${streamingState.apiBase}/upload/part-urls`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            upload_id: streamingState.uploadId,
            s3_key: streamingState.s3Key,
            part_numbers: [partNumber],
          }),
        });
        if (!urlsRes.ok) throw new Error(`part-urls ${urlsRes.status}`);
        const { urls } = await urlsRes.json();
        const etag = await streamingPut(urls[partNumber], blob);
        if (!streamingState) return;
        streamingState.etags.push({ part_number: partNumber, etag });
        updateStreamingProgress();
      }
    } catch (e) {
      console.warn("streaming worker 실패", e);
      if (streamingState) streamingState.failed = e;
    } finally {
      if (streamingState) streamingState.workerActive = false;
    }
  }

  function updateStreamingProgress() {
    if (!streamingState) return;
    const mb = (streamingState.etags.length * streamingState.partSize / (1024 * 1024)).toFixed(0);
    if (recording) {
      setStatus("recording", `녹화 중 — ${mb}MB 업로드됨`);
    }
  }

  // 정지 시 호출. 잔여 버퍼 flush → 큐 드레인 → complete. wall-clock timeout 적용.
  async function finalizeStreaming() {
    if (!streamingState) throw new Error("스트리밍 세션이 없어요");
    if (streamingState.failed) throw streamingState.failed;

    // 잔여 버퍼를 마지막 파트로 (5MB 미만 OK)
    if (streamingState.bufferSize > 0) streamingCutPart(streamingState.bufferSize);
    if (!streamingState.workerActive) streamingStartWorker();

    const deadline = Date.now() + STREAM_FINALIZE_TIMEOUT_MS;
    while (streamingState && !streamingState.failed &&
           (streamingState.pendingPartsQueue.length > 0 || streamingState.workerActive)) {
      if (Date.now() > deadline) {
        if (streamingState) streamingState.failed = new Error("마무리 시간 초과");
        throw streamingState.failed;
      }
      await new Promise(r => setTimeout(r, 100));
    }
    if (!streamingState) throw new Error("스트리밍 세션이 종료됨");
    if (streamingState.failed) throw streamingState.failed;
    if (streamingState.etags.length === 0) throw new Error("업로드된 파트가 없어요");

    const completeRes = await fetchWithTimeout(`${streamingState.apiBase}/upload/complete`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        upload_id: streamingState.uploadId,
        s3_key: streamingState.s3Key,
        parts: streamingState.etags.slice().sort((a, b) => a.part_number - b.part_number),
      }),
    });
    if (!completeRes.ok) throw new Error(`complete ${completeRes.status}`);
    const data = await completeRes.json();
    streamingState = null;
    return data;
  }

  // best-effort 정리 — 페이지 떠나기 전 multipart abort
  function abortStreamingBackground() {
    if (!streamingState) return;
    const ss = streamingState;
    streamingState = null;
    fetchWithTimeout(`${ss.apiBase}/upload/abort`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ upload_id: ss.uploadId, s3_key: ss.s3Key }),
    }).catch(() => {});
  }

  // ──────────────────────────────────────────────────────────────────
  // 사용자 제스처에서 fullscreen + orientation lock → 그 다음 카메라 init
  // (모바일 브라우저는 fullscreen 없이 orientation lock 불가)
  // ──────────────────────────────────────────────────────────────────
  async function beginCamera() {
    // 1. fullscreen 진입 — iOS Safari는 documentElement에 안 됨, 시도 자체를 건너뜀
    if (!IS_IOS) {
      try {
        const el = document.documentElement;
        if (el.requestFullscreen) await el.requestFullscreen();
        else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
      } catch (e) {
        console.warn("fullscreen 실패", e);
      }
    }
    // 2. 가로 잠금 (iOS Safari는 미지원 → throw 무시)
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock("landscape");
      }
    } catch (e) {
      console.warn("orientation lock 실패", e);
    }
    // 3. 오버레이 숨기고 카메라 init
    document.getElementById("startOverlay").classList.add("hidden");
    await init();
  }

  // ──────────────────────────────────────────────────────────────────
  // 카메라 초기화 + 스트리밍 세션 미리 오픈
  // ──────────────────────────────────────────────────────────────────
  async function init() {
    if (!SESSION_ID || !DB_SESSION_ID) {
      setStatus("error", "올바르지 않은 QR 코드예요");
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          aspectRatio: { ideal: 16 / 9, min: 1.5 },
        },
        audio: true,
      });
      const videoEl = document.getElementById("videoPreview");
      videoEl.srcObject = stream;
      // iOS Safari는 await 여러 번 거치면 user-gesture 컨텍스트가 끊겨 autoplay 거부 → 까만 화면.
      // 명시적 play()로 강제. muted+playsInline이라 사용자 탭 없어도 허용됨.
      try { await videoEl.play(); } catch (e) { console.warn("preview play 실패", e); }
    } catch (e) {
      setStatus("error", "카메라 접근 실패 — 권한을 허용해주세요");
      return;
    }

    // 스트리밍 multipart 세션을 미리 열어둠 — 녹화 시작 전 무조건 성공해야 함
    setStatus("ready", "업로드 세션 준비 중...");
    try {
      await initStreaming();
    } catch (e) {
      console.warn("streaming init 실패", e);
      setStatus("error", "업로드 준비 실패 — 새로고침 후 다시 시도해주세요");
      return;
    }

    setStatus("ready", "촬영 버튼을 눌러 시작하세요");
    fetch(`${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/connect`, { method: "POST" });
  }

  // ──────────────────────────────────────────────────────────────────
  // 녹화
  // ──────────────────────────────────────────────────────────────────
  function toggleRecord() {
    if (!recording) startRecord();
    else stopRecord();
  }

  async function startRecord() {
    if (!stream) return;
    if (!streamingState || streamingState.failed) {
      setStatus("error", "업로드 준비가 안 됐어요. 새로고침 후 다시 시도해주세요");
      return;
    }

    const options = {
      videoBitsPerSecond: TARGET_VIDEO_BPS,
      audioBitsPerSecond: TARGET_AUDIO_BPS,
    };
    if (currentMimeType) options.mimeType = currentMimeType;

    recordingPipeline = await buildRecordingStream(stream);
    const recStream = recordingPipeline.stream;

    try {
      mediaRecorder = new MediaRecorder(recStream, options);
    } catch (e) {
      // 일부 기기는 bitrate 옵션을 거부 → fallback
      mediaRecorder = new MediaRecorder(recStream, currentMimeType ? { mimeType: currentMimeType } : undefined);
    }

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size === 0) return;
      streamingFeedChunk(e.data);
    };

    mediaRecorder.onstop = async () => {
      if (recordingPipeline) {
        recordingPipeline.cleanup();
        recordingPipeline = null;
      }

      if (!streamingState || streamingState.failed) {
        const msg = streamingState?.failed?.message || "업로드 세션 종료";
        setStatus("error", `업로드 실패: ${msg}`);
        setMsg("다시 녹화해주세요");
        return;
      }

      try {
        setStatus("ready", "업로드 마무리 중...");
        const data = await finalizeStreaming();
        await fetchWithTimeout(
          `${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/done?video_url=${encodeURIComponent(data.s3_url || "")}`,
          { method: "POST" },
        );
        hideProgress();
        setStatus("done", "모든 작업이 완료됐어요!");
      } catch (e) {
        console.warn("finalize 실패", e);
        setStatus("error", `업로드 실패: ${e.message}`);
        setMsg("다시 녹화해주세요");
      }
    };

    mediaRecorder.start(CHUNK_TIMESLICE_MS);
    recording = true;
    document.getElementById("recordBtn").className = "record-btn recording";
    setStatus("recording", "녹화 중...");

    fetch(`${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/recording`, { method: "POST" });
  }

  function stopRecord() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    recording = false;
    document.getElementById("recordBtn").className = "record-btn stopped";

    fetch(`${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/stop`,
      { method: "POST" });
  }

  function setProgress(pct) {
    const wrap = document.getElementById("progress");
    const bar = document.getElementById("progressBar");
    wrap.style.display = "block";
    bar.style.width = `${Math.min(100, Math.max(0, pct)).toFixed(1)}%`;
  }
  function hideProgress() {
    document.getElementById("progress").style.display = "none";
  }

  function setStatus(type, text) {
    document.getElementById("statusDot").className = `dot ${type}`;
    document.getElementById("statusText").textContent = text;
  }
  function setMsg(t) { document.getElementById("msg").textContent = t; }

  // 페이지 떠나기 전 multipart abort (orphan 방지, best-effort)
  window.addEventListener("pagehide", () => {
    if (recording && mediaRecorder && mediaRecorder.state !== "inactive") {
      try { mediaRecorder.stop(); } catch {}
    }
    abortStreamingBackground();
  });

  // QR로 들어오자마자 자동 init하지 않음 — '촬영 준비' 버튼 탭(=사용자 제스처)으로 시작.
  // 잘못된 QR이면 오버레이 위로 에러 표시.
  if (!SESSION_ID || !DB_SESSION_ID) {
    setStatus("error", "올바르지 않은 QR 코드예요");
  }
</script>
</body>
</html>
