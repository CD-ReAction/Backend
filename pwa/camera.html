<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re:Action — 카메라</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc; flex-shrink: 0;
    }
    .header .dot.ready { background: #22c55e; }
    .header .dot.recording { background: #ef4444; animation: recBlink 1s infinite; }
    .header .dot.done { background: #3b82f6; }
    .header .dot.error { background: #ef4444; }
    @keyframes recBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .header .status-text { font-size: 14px; color: rgba(255,255,255,0.85); }
    #videoPreview {
      width: 100%; height: 100%;
      object-fit: cover; flex: 1;
    }
    .controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 20px 24px 48px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .record-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 4px solid white;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .record-btn:active { transform: scale(0.93); }
    .record-inner {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #ef4444;
      transition: border-radius 0.25s, width 0.25s, height 0.25s;
    }
    .record-btn.recording .record-inner {
      border-radius: 6px;
      width: 26px; height: 26px;
    }
    .record-btn.stopped .record-inner { background: #555; }
    .upload-btn {
      display: none;
      width: 100%; max-width: 320px;
      padding: 15px;
      background: white;
      border: none; border-radius: 14px;
      color: #111; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .upload-btn:disabled { opacity: 0.5; cursor: default; }
    .upload-btn.uploading { background: #3b82f6; color: white; }
    .upload-btn.success { background: #22c55e; color: white; }
    .msg { font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; }
    .progress {
      width: 100%; max-width: 320px; height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px; overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: #3b82f6; transition: width 0.2s;
    }
    .start-overlay {
      position: fixed; inset: 0;
      z-index: 100;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 24px;
    }
    .start-overlay.hidden { display: none; }
    .start-icon { font-size: 56px; }
    .start-text {
      font-size: 16px; line-height: 1.6;
      color: rgba(255,255,255,0.85);
      text-align: center;
    }
    .start-btn {
      margin-top: 12px;
      padding: 16px 28px;
      background: white; color: #111;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="start-overlay" id="startOverlay">
    <div class="start-icon">📱↻</div>
    <div class="start-text">
      핸드폰을 가로로 돌린 뒤<br>
      아래 버튼을 눌러주세요
    </div>
    <button class="start-btn" onclick="beginCamera()">촬영 준비</button>
  </div>

  <div class="header">
    <div class="dot" id="statusDot"></div>
    <span class="status-text" id="statusText">카메라 준비 중...</span>
  </div>

  <video id="videoPreview" autoplay muted playsinline></video>

  <div class="controls">
    <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
    <button class="upload-btn" id="uploadBtn" onclick="uploadVideo()">영상 업로드</button>
    <div class="record-btn" id="recordBtn" onclick="toggleRecord()">
      <div class="record-inner"></div>
    </div>
    <div class="msg" id="msg"></div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const SESSION_ID = params.get("session");      // camera-session ID (인메모리)
  const DB_SESSION_ID = params.get("db_session"); // DB sessions 테이블 ID

  // 녹화 품질: 1080p / 4Mbps → 1시간 약 1.8GB, 표정 분석에 충분
  const TARGET_VIDEO_BPS = 4_000_000;
  const TARGET_AUDIO_BPS = 128_000;
  // 5초 단위 청크 → 끊겨도 5초 이내 손실, IndexedDB로 백업
  const CHUNK_TIMESLICE_MS = 5000;
  // 업로드 파트 크기: 백엔드 UPLOAD_PART_SIZE_MB (16MB) 와 일치시킴
  const UPLOAD_PART_SIZE = 16 * 1024 * 1024;
  // 동시 업로드 파트 수 (모바일에서 안정적인 상한)
  const UPLOAD_CONCURRENCY = 6;

  let mediaRecorder = null;
  let stream = null;
  let recording = false;
  let videoBlob = null;
  let currentMimeType = "";
  let pendingChunkWrites = 0;
  let recordingPipeline = null;
  // 스트리밍 업로드 상태 (녹화 중 동시 업로드용)
  let streamingState = null;

  // ──────────────────────────────────────────────────────────────────
  // 폰이 세로면 캔버스로 90° 회전시켜서 항상 가로 픽셀로 녹화
  // ──────────────────────────────────────────────────────────────────
  function shouldRotateForRecording(srcStream) {
    const orient = screen.orientation?.type || "";
    if (orient.startsWith("portrait")) return true;
    const track = srcStream.getVideoTracks()[0];
    const { width, height } = track.getSettings();
    if (width && height && height > width) return true;
    return false;
  }

  function buildRecordingStream(srcStream) {
    if (!shouldRotateForRecording(srcStream)) {
      return { stream: srcStream, cleanup: () => {} };
    }

    const videoEl = document.createElement("video");
    videoEl.srcObject = srcStream;
    videoEl.muted = true;
    videoEl.playsInline = true;
    videoEl.play().catch(() => {});

    const canvas = document.createElement("canvas");
    canvas.width = 1920;
    canvas.height = 1080;
    const ctx = canvas.getContext("2d");

    let sw = 0, sh = 0;
    let stopped = false;

    function tick() {
      if (stopped) return;
      if (videoEl.readyState >= 2) {
        if (!sw && videoEl.videoWidth) {
          sw = videoEl.videoWidth;
          sh = videoEl.videoHeight;
          canvas.width = sh;
          canvas.height = sw;
        }
        if (sw && sh) {
          ctx.save();
          ctx.translate(canvas.width / 2, canvas.height / 2);
          ctx.rotate(-Math.PI / 2);
          ctx.drawImage(videoEl, -sw / 2, -sh / 2, sw, sh);
          ctx.restore();
        }
      }
      requestAnimationFrame(tick);
    }
    tick();

    const canvasStream = canvas.captureStream(30);
    srcStream.getAudioTracks().forEach(t => canvasStream.addTrack(t));

    return {
      stream: canvasStream,
      cleanup: () => {
        stopped = true;
        videoEl.srcObject = null;
      },
    };
  }

  // ──────────────────────────────────────────────────────────────────
  // MediaRecorder mimeType picker (VP9 → VP8 → MP4 H.264 → 기본)
  // ──────────────────────────────────────────────────────────────────
  function pickMimeType() {
    const candidates = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm",
      "video/mp4;codecs=h264,aac",
      "video/mp4",
    ];
    for (const t of candidates) {
      if (window.MediaRecorder?.isTypeSupported?.(t)) return t;
    }
    return "";
  }
  // 업로드 시 서버에 보낼 content-type (codecs 파라미터는 떼야 ALLOWED_MIME 통과)
  function baseMime(m) {
    if (!m) return "video/webm";
    const base = m.split(";")[0].trim();
    return base === "video/webm" || base === "video/mp4" || base === "video/quicktime"
      ? base : "video/webm";
  }

  // ──────────────────────────────────────────────────────────────────
  // IndexedDB: 청크 단위 저장으로 탭 닫혀도 복구 가능
  // ──────────────────────────────────────────────────────────────────
  const IDB_NAME = "reaction-recordings";
  const IDB_STORE = "chunks";

  function openIdb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) {
          const store = db.createObjectStore(IDB_STORE, { keyPath: "id", autoIncrement: true });
          store.createIndex("sessionId", "sessionId", { unique: false });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbAddChunk(sessionId, mimeType, blob) {
    const db = await openIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).add({ sessionId, mimeType, blob, ts: Date.now() });
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  }

  async function idbGetChunks(sessionId) {
    const db = await openIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const idx = tx.objectStore(IDB_STORE).index("sessionId");
      const req = idx.getAll(IDBKeyRange.only(String(sessionId)));
      req.onsuccess = () => { db.close(); resolve((req.result || []).sort((a,b) => a.id - b.id)); };
      req.onerror = () => { db.close(); reject(req.error); };
    });
  }

  async function idbClearChunks(sessionId) {
    const db = await openIdb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      const idx = tx.objectStore(IDB_STORE).index("sessionId");
      const req = idx.openCursor(IDBKeyRange.only(String(sessionId)));
      req.onsuccess = () => {
        const cursor = req.result;
        if (cursor) { cursor.delete(); cursor.continue(); }
      };
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror = () => { db.close(); reject(tx.error); };
    });
  }

  // ──────────────────────────────────────────────────────────────────
  // 사용자 제스처에서 fullscreen + orientation lock → 그 다음 카메라 init
  // (모바일 브라우저는 fullscreen 없이 orientation lock 불가)
  // ──────────────────────────────────────────────────────────────────
  async function beginCamera() {
    // 1. fullscreen 진입 (모바일에선 lock 전제조건)
    try {
      const el = document.documentElement;
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
    } catch (e) {
      console.warn("fullscreen 실패", e);
    }
    // 2. 가로 잠금 (iOS Safari는 미지원 → throw 무시)
    try {
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock("landscape");
      }
    } catch (e) {
      console.warn("orientation lock 실패", e);
    }
    // 3. 오버레이 숨기고 카메라 init
    document.getElementById("startOverlay").classList.add("hidden");
    await init();
  }

  // ──────────────────────────────────────────────────────────────────
  // 카메라 초기화 + 미완료 녹화 복구
  // ──────────────────────────────────────────────────────────────────
  async function init() {
    if (!SESSION_ID || !DB_SESSION_ID) {
      setStatus("error", "올바르지 않은 QR 코드예요");
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          aspectRatio: { ideal: 16 / 9, min: 1.5 },
        },
        audio: true,
      });
      document.getElementById("videoPreview").srcObject = stream;
      setStatus("ready", "촬영 버튼을 눌러 시작하세요");

      await fetch(
        `${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/connect`,
        { method: "POST" }
      );

      // 이전 세션에서 남은 청크 복구
      try {
        const leftover = await idbGetChunks(String(DB_SESSION_ID));
        if (leftover.length > 0) {
          const totalMb = (leftover.reduce((s, c) => s + c.blob.size, 0) / (1024*1024)).toFixed(1);
          const ok = confirm(`이전 녹화 ${leftover.length}개 조각(${totalMb}MB)이 남아있어요. 복구해서 업로드할까요?`);
          if (ok) {
            currentMimeType = leftover[0].mimeType || "video/webm";
            videoBlob = new Blob(leftover.map(c => c.blob), { type: baseMime(currentMimeType) });
            document.getElementById("uploadBtn").style.display = "block";
            setStatus("ready", "복구된 영상 — 업로드 버튼을 눌러주세요");
          } else {
            await idbClearChunks(String(DB_SESSION_ID));
          }
        }
      } catch (err) {
        console.warn("청크 복구 실패", err);
      }
    } catch (e) {
      setStatus("error", "카메라 접근 실패 — 권한을 허용해주세요");
    }
  }

  // ──────────────────────────────────────────────────────────────────
  // 녹화
  // ──────────────────────────────────────────────────────────────────
  function toggleRecord() {
    if (!recording) startRecord();
    else stopRecord();
  }

  async function startRecord() {
    if (!stream) return;
    // 새 녹화 시작 전 이전 청크 정리
    try { await idbClearChunks(String(DB_SESSION_ID)); } catch {}
    videoBlob = null;
    streamingState = null;
    document.getElementById("uploadBtn").style.display = "none";

    currentMimeType = pickMimeType();
    const options = {
      videoBitsPerSecond: TARGET_VIDEO_BPS,
      audioBitsPerSecond: TARGET_AUDIO_BPS,
    };
    if (currentMimeType) options.mimeType = currentMimeType;

    // 스트리밍 업로드 init — 실패 시 녹화 중단하지 않고 폴백 모드(녹화 후 일괄 업로드)로 진행
    const contentType = baseMime(currentMimeType || "video/webm");
    try {
      streamingState = await initStreamingUpload(contentType);
    } catch (e) {
      console.warn("스트리밍 업로드 init 실패 — 녹화 후 일괄 업로드로 폴백", e);
      streamingState = null;
    }

    recordingPipeline = buildRecordingStream(stream);
    const recStream = recordingPipeline.stream;

    try {
      mediaRecorder = new MediaRecorder(recStream, options);
    } catch (e) {
      // 일부 기기는 bitrate 옵션을 거부 → fallback
      mediaRecorder = new MediaRecorder(recStream, currentMimeType ? { mimeType: currentMimeType } : undefined);
    }

    pendingChunkWrites = 0;
    mediaRecorder.ondataavailable = async (e) => {
      if (e.data.size === 0) return;
      pendingChunkWrites++;
      try {
        await idbAddChunk(String(DB_SESSION_ID), currentMimeType || e.data.type, e.data);
      } catch (err) {
        console.warn("청크 저장 실패", err);
      } finally {
        pendingChunkWrites--;
      }
      // 스트리밍 모드면 동시에 업로드 파이프라인에 투입
      if (streamingState && !streamingState.failed) {
        streamingFeedChunk(e.data);
      }
    };
    mediaRecorder.onstop = async () => {
      // ondataavailable이 비동기라 IDB 쓰기 끝날 때까지 대기
      while (pendingChunkWrites > 0) await new Promise(r => setTimeout(r, 50));
      if (recordingPipeline) {
        recordingPipeline.cleanup();
        recordingPipeline = null;
      }

      // 스트리밍 모드 성공 시: 잔여 flush + complete → 즉시 완료 처리
      if (streamingState && !streamingState.failed) {
        try {
          setStatus("ready", "업로드 마무리 중...");
          const data = await finalizeStreaming();
          await fetch(
            `${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/done?video_url=${encodeURIComponent(data.s3_url || "")}`,
            { method: "POST" }
          );
          try { await idbClearChunks(String(DB_SESSION_ID)); } catch {}
          streamingState = null;
          hideProgress();
          setStatus("done", "모든 작업이 완료됐어요!");
          return;
        } catch (e) {
          console.warn("스트리밍 마무리 실패 — 일괄 업로드로 폴백", e);
          streamingState = null;
          // 폴백 — 일괄 업로드 UX로
        }
      }

      // 폴백 또는 처음부터 비스트리밍 모드
      const stored = await idbGetChunks(String(DB_SESSION_ID));
      const type = baseMime(stored[0]?.mimeType || currentMimeType);
      videoBlob = new Blob(stored.map(c => c.blob), { type });
      document.getElementById("uploadBtn").style.display = "block";
      setStatus("ready", "촬영 완료! 업로드 버튼을 눌러주세요");
    };

    mediaRecorder.start(CHUNK_TIMESLICE_MS);
    recording = true;
    document.getElementById("recordBtn").className = "record-btn recording";
    setStatus("recording", streamingState ? "녹화 중 — 실시간 업로드" : "녹화 중...");

    fetch(`${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/recording`, { method: "POST" });

  }



  function stopRecord() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    recording = false;
    document.getElementById("recordBtn").className = "record-btn stopped";

    fetch(`${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/stop`, 
      { method: "POST" });
  }

  // ──────────────────────────────────────────────────────────────────
  // 업로드: S3 multipart presigned URL로 폰 → S3 직접
  // ──────────────────────────────────────────────────────────────────
  function setProgress(pct) {
    const wrap = document.getElementById("progress");
    const bar = document.getElementById("progressBar");
    wrap.style.display = "block";
    bar.style.width = `${Math.min(100, Math.max(0, pct)).toFixed(1)}%`;
  }
  function hideProgress() {
    document.getElementById("progress").style.display = "none";
  }

  // 녹화된 blob에서 실제 인코딩된 픽셀 크기 읽기 (iOS rotation 함정 회피용)
  async function getVideoDimensions(blob) {
    return new Promise((resolve) => {
      const url = URL.createObjectURL(blob);
      const v = document.createElement("video");
      v.muted = true;
      v.playsInline = true;
      v.preload = "metadata";
      v.onloadedmetadata = () => {
        const dims = { width: v.videoWidth, height: v.videoHeight };
        URL.revokeObjectURL(url);
        resolve(dims);
      };
      v.onerror = () => {
        URL.revokeObjectURL(url);
        resolve({ width: 0, height: 0 });
      };
      v.src = url;
    });
  }

  // ──────────────────────────────────────────────────────────────────
  // 스트리밍 업로드: 녹화 중 발생하는 청크를 partSize(16MB) 단위로 모아 즉시 S3 PUT
  // 정지 시점엔 잔여분 + complete만 호출하므로 체감 업로드 시간이 거의 0
  // ──────────────────────────────────────────────────────────────────
  async function initStreamingUpload(contentType) {
    const apiBase = `${CONFIG.API_BASE_URL}/api/v1/sessions/${DB_SESSION_ID}/video`;
    const initRes = await fetch(`${apiBase}/upload/init`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content_type: contentType }), // file_size 미정 → 옵셔널
    });
    if (!initRes.ok) throw new Error(`init 실패 (${initRes.status})`);
    const { upload_id, s3_key, part_size } = await initRes.json();

    return {
      apiBase,
      contentType,
      uploadId: upload_id,
      s3Key: s3_key,
      partSize: part_size,
      buffer: [],          // 미분할 청크들(Blob[])
      bufferSize: 0,
      nextPartNumber: 1,
      pendingPartsQueue: [],  // [{partNumber, blob}, ...]
      etags: [],           // 완료된 파트들
      workerActive: false,
      failed: null,        // 업로드 도중 에러
      stopRequested: false,
    };
  }

  // 버퍼에 청크 누적 → partSize 차면 cut & enqueue → worker 트리거
  function streamingFeedChunk(chunkBlob) {
    if (!streamingState || streamingState.failed) return;
    streamingState.buffer.push(chunkBlob);
    streamingState.bufferSize += chunkBlob.size;

    while (streamingState.bufferSize >= streamingState.partSize) {
      streamingCutPart(streamingState.partSize);
    }

    if (!streamingState.workerActive) streamingStartWorker();
  }

  // 버퍼에서 targetSize 바이트만큼 잘라 다음 파트로 등록. 잔여는 버퍼에 남김.
  function streamingCutPart(targetSize) {
    const combined = new Blob(streamingState.buffer, { type: streamingState.contentType });
    const actual = Math.min(targetSize, combined.size);
    const partBlob = combined.slice(0, actual);
    const remainder = combined.slice(actual);
    streamingState.buffer = remainder.size > 0 ? [remainder] : [];
    streamingState.bufferSize = remainder.size;

    const partNumber = streamingState.nextPartNumber++;
    streamingState.pendingPartsQueue.push({ partNumber, blob: partBlob });
  }

  // 큐에 쌓인 파트를 순차 업로드 (회선 1개로 충분 — 녹화 0.5MB/s vs 업로드 1MB/s+)
  async function streamingStartWorker() {
    if (streamingState.workerActive) return;
    streamingState.workerActive = true;
    try {
      while (streamingState.pendingPartsQueue.length > 0) {
        const { partNumber, blob } = streamingState.pendingPartsQueue.shift();
        const urlsRes = await fetch(`${streamingState.apiBase}/upload/part-urls`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            upload_id: streamingState.uploadId,
            s3_key: streamingState.s3Key,
            part_numbers: [partNumber],
          }),
        });
        if (!urlsRes.ok) throw new Error(`part-urls 실패 (${urlsRes.status})`);
        const { urls } = await urlsRes.json();
        const etag = await putWithRetry(urls[partNumber], blob);
        streamingState.etags.push({ part_number: partNumber, etag });
        streamingUpdateUi();
      }
    } catch (e) {
      streamingState.failed = e;
    } finally {
      streamingState.workerActive = false;
    }
  }

  function streamingUpdateUi() {
    if (!streamingState) return;
    const uploadedMb = (streamingState.etags.length * streamingState.partSize / (1024 * 1024)).toFixed(0);
    const baseText = recording ? "녹화 중 — 업로드" : "업로드 마무리 중";
    document.getElementById("statusText").textContent = `${baseText} (${uploadedMb}MB 전송)`;
  }

  // 정지 시 호출 — 잔여 버퍼 flush + 큐 드레인 + /upload/complete
  async function finalizeStreaming() {
    if (!streamingState) return null;
    streamingState.stopRequested = true;

    // 잔여 버퍼를 마지막 파트로 (5MB 미만 OK — S3는 마지막 파트만 예외)
    if (streamingState.bufferSize > 0) {
      streamingCutPart(streamingState.bufferSize);
    }
    if (!streamingState.workerActive) streamingStartWorker();

    // 큐 드레인 대기
    while (streamingState.pendingPartsQueue.length > 0 || streamingState.workerActive) {
      if (streamingState.failed) throw streamingState.failed;
      await new Promise(r => setTimeout(r, 100));
    }
    if (streamingState.failed) throw streamingState.failed;

    if (streamingState.etags.length === 0) {
      throw new Error("업로드된 파트가 없어요 (녹화 데이터 없음)");
    }

    // complete
    const completeRes = await fetch(`${streamingState.apiBase}/upload/complete`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        upload_id: streamingState.uploadId,
        s3_key: streamingState.s3Key,
        parts: streamingState.etags.slice().sort((a, b) => a.part_number - b.part_number),
      }),
    });
    if (!completeRes.ok) throw new Error(`complete 실패 (${completeRes.status})`);
    return await completeRes.json();
  }

  async function putWithRetry(url, blob, maxAttempts = 4) {
    let attempt = 0;
    let lastErr;
    while (attempt < maxAttempts) {
      try {
        const res = await fetch(url, { method: "PUT", body: blob });
        if (!res.ok) throw new Error(`PUT ${res.status}`);
        const etag = res.headers.get("ETag");
        if (!etag) throw new Error("ETag 없음 (CORS ExposeHeaders 확인)");
        return etag.replaceAll('"', "");
      } catch (e) {
        lastErr = e;
        attempt++;
        // 지수 backoff: 0.5s, 1s, 2s, 4s
        await new Promise(r => setTimeout(r, 500 * Math.pow(2, attempt - 1)));
      }
    }
    throw lastErr;
  }

  async function uploadVideo() {
    if (!videoBlob) return;
    const btn = document.getElementById("uploadBtn");
    btn.disabled = true;
    btn.className = "upload-btn uploading";
    btn.textContent = "업로드 준비 중...";
    setMsg("");
    setProgress(0);

    const apiBase = `${CONFIG.API_BASE_URL}/api/v1/sessions/${DB_SESSION_ID}/video`;
    const contentType = baseMime(currentMimeType || videoBlob.type);
    let uploadId, s3Key, partSize, partCount;

    try {
      // 1) init
      const { width: videoWidth, height: videoHeight } = await getVideoDimensions(videoBlob);
      const initBody = {
        content_type: contentType,
        file_size: videoBlob.size,
      };
      if (videoWidth > 0 && videoHeight > 0) {
        initBody.width = videoWidth;
        initBody.height = videoHeight;
      }
      const initRes = await fetch(`${apiBase}/upload/init`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(initBody),
      });
      if (!initRes.ok) throw new Error(`init 실패 (${initRes.status})`);
      ({ upload_id: uploadId, s3_key: s3Key, part_size: partSize, part_count: partCount } = await initRes.json());

      // 2) part-urls (한 번에 다 발급)
      const partNumbers = Array.from({ length: partCount }, (_, i) => i + 1);
      const urlsRes = await fetch(`${apiBase}/upload/part-urls`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ upload_id: uploadId, s3_key: s3Key, part_numbers: partNumbers }),
      });
      if (!urlsRes.ok) throw new Error(`part-urls 실패 (${urlsRes.status})`);
      const { urls } = await urlsRes.json();

      // 3) 병렬 PUT (UPLOAD_CONCURRENCY 만큼 동시 진행)
      btn.textContent = "업로드 중... 0%";
      const etags = new Array(partCount);
      let completed = 0;

      async function worker(queue) {
        while (queue.length > 0) {
          const n = queue.shift();
          const start = (n - 1) * partSize;
          const end = Math.min(start + partSize, videoBlob.size);
          const chunk = videoBlob.slice(start, end);
          const etag = await putWithRetry(urls[n], chunk);
          etags[n - 1] = { part_number: n, etag };
          completed++;
          const pct = (completed / partCount) * 100;
          setProgress(pct);
          btn.textContent = `업로드 중... ${pct.toFixed(0)}%`;
        }
      }
      const queue = [...partNumbers];
      await Promise.all(
        Array.from({ length: Math.min(UPLOAD_CONCURRENCY, partCount) }, () => worker(queue))
      );

      // 4) complete
      btn.textContent = "조립 중...";
      const completeRes = await fetch(`${apiBase}/upload/complete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ upload_id: uploadId, s3_key: s3Key, parts: etags }),
      });
      if (!completeRes.ok) throw new Error(`complete 실패 (${completeRes.status})`);
      const data = await completeRes.json();

      // 5) 카메라 세션 done + IDB 정리
      await fetch(
        `${CONFIG.API_BASE_URL}/api/v1/camera-session/${SESSION_ID}/done?video_url=${encodeURIComponent(data.s3_url || "")}`,
        { method: "POST" }
      );
      try { await idbClearChunks(String(DB_SESSION_ID)); } catch {}

      hideProgress();
      btn.className = "upload-btn success";
      btn.textContent = "업로드 완료 ✅";
      setStatus("done", "모든 작업이 완료됐어요!");
    } catch (e) {
      // 실패 시 S3 조각 정리 시도 (best effort)
      if (uploadId && s3Key) {
        fetch(`${apiBase}/upload/abort`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ upload_id: uploadId, s3_key: s3Key }),
        }).catch(() => {});
      }
      hideProgress();
      btn.disabled = false;
      btn.className = "upload-btn";
      btn.textContent = "다시 업로드";
      setMsg(`업로드 실패: ${e.message}`);
    }
  }

  function setStatus(type, text) {
    document.getElementById("statusDot").className = `dot ${type}`;
    document.getElementById("statusText").textContent = text;
  }
  function setMsg(t) { document.getElementById("msg").textContent = t; }

  // QR로 들어오자마자 자동 init하지 않음 — '촬영 준비' 버튼 탭(=사용자 제스처)으로 시작.
  // 잘못된 QR이면 오버레이 위로 에러 표시.
  if (!SESSION_ID || !DB_SESSION_ID) {
    setStatus("error", "올바르지 않은 QR 코드예요");
  }
</script>
