<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Re:Action — 카메라 연결</title>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .brand { font-size: 14px; font-weight: 600; color: #999; margin-bottom: 12px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .desc { font-size: 14px; color: #666; margin-bottom: 24px; }
    .qr-box {
      background: #f8f8f8;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      min-height: 240px;
      justify-content: center;
    }
    #qrcode canvas { border-radius: 8px; }
    .code-label { font-size: 12px; color: #999; }
    .code {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #111;
    }
    .expires { font-size: 12px; color: #aaa; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      background: #f8f8f8;
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .dot.waiting { background: #ccc; animation: pulse 1.5s infinite; }
    .dot.connected { background: #22c55e; }
    .dot.done { background: #3b82f6; }
    .dot.expired { background: #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .btn {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      font-size: 15px;
      cursor: pointer;
      color: #333;
    }
    .btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Re:Action</div>
  <h1>휴대폰 카메라 연결</h1>
  <p class="desc">QR 코드를 스캔하면 카메라 앱이 자동으로 실행됩니다.</p>

  <div class="qr-box">
    <div id="qrcode"></div>
    <div class="code-label">또는 직접 입력</div>
    <div class="code" id="codeDisplay">- -</div>
    <div class="expires" id="expiresDisplay">생성 중...</div>
  </div>

  <div class="status-bar">
    <div class="dot waiting" id="statusDot"></div>
    <span id="statusText">연결 대기 중...</span>
  </div>

  <button class="btn" onclick="createSession()">새 코드 생성</button>
</div>

<script>
  let sessionId = null;
  let pollInterval = null;
  let countdownInterval = null;
  let expiresAt = null;

  async function createSession() {
    clearInterval(pollInterval);
    clearInterval(countdownInterval);
    document.getElementById("qrcode").innerHTML = "";
    document.getElementById("codeDisplay").textContent = "- -";
    document.getElementById("expiresDisplay").textContent = "생성 중...";
    setStatus("waiting", "연결 대기 중...");

    try {
      const res = await fetch(
        `${CONFIG.API_BASE_URL}/api/v1/camera-session/create?pwa_base_url=${CONFIG.PWA_BASE_URL}`,
        { method: "POST" }
      );
      if (!res.ok) throw new Error("서버 응답 오류");
      const data = await res.json();
      sessionId = data.session_id;
      expiresAt = new Date(data.expires_at + "Z");

      // QR 생성
      QRCode.toCanvas(document.createElement("canvas"), data.camera_url, { width: 180 }, (err, canvas) => {
        if (!err) {
          document.getElementById("qrcode").appendChild(canvas);
        }
      });

      // 코드 표시
      const parts = data.code.match(/.{1,2}/g) || [data.code];
      document.getElementById("codeDisplay").textContent = parts.join(" · ");

      // 만료 카운트다운
      startCountdown();

      // 폴링 시작
      pollInterval = setInterval(pollStatus, 1000);
    } catch (e) {
      setStatus("expired", "API 연결 실패 — 서버를 확인해주세요");
    }
  }

  function startCountdown() {
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      const diff = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
      const m = Math.floor(diff / 60);
      const s = diff % 60;
      document.getElementById("expiresDisplay").textContent =
        diff > 0 ? `${m}:${String(s).padStart(2, "0")} 후 만료` : "만료됨";
      if (diff === 0) clearInterval(countdownInterval);
    }, 1000);
  }

  async function pollStatus() {
    if (!sessionId) return;
    try {
      const res = await fetch(`${CONFIG.API_BASE_URL}/api/v1/camera-session/${sessionId}/status`);
      const data = await res.json();
      if (data.status === "connected") {
        setStatus("connected", "📱 핸드폰 연결됨 — 촬영을 시작하세요");
      } else if (data.status === "done") {
        clearInterval(pollInterval);
        setStatus("done", "✅ 영상 업로드 완료!");
      } else if (data.status === "expired") {
        clearInterval(pollInterval);
        setStatus("expired", "세션 만료 — 새 코드를 생성해주세요");
      }
    } catch (e) {}
  }

  function setStatus(type, text) {
    const dot = document.getElementById("statusDot");
    dot.className = `dot ${type}`;
    document.getElementById("statusText").textContent = text;
  }

  // 페이지 로드 시 자동 세션 생성
  createSession();
</script>
</body>
</html>
